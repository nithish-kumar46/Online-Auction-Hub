<!DOCTYPE html>
<html>
<head>
    <title>Place Bid</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-96">

    <h2 class="text-2xl font-bold mb-4 text-center">💰 Place Your Bid</h2>

    <form method="POST" class="space-y-4">

        <input type="number" step="0.01" name="bid_amount" 
               placeholder="Enter Bid Amount"
               class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-yellow-400">

        <button class="w-full bg-yellow-500 hover:bg-yellow-600 text-white p-3 rounded font-semibold">
            Submit Bid
        </button>

    </form>

    <div class="mt-4 text-center">
        <a href="/" class="text-blue-500 hover:underline">⬅ Back to Home</a>
    </div>

</div>

</body>
</html>
