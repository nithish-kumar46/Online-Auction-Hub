<!DOCTYPE html>
<html>
<head>
    <title>Create Auction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-96">

    <h2 class="text-2xl font-bold mb-4 text-center">📦 Create Auction</h2>

    <form method="POST" class="space-y-3">

        <input type="text" name="seller_id" placeholder="Seller ID"
               class="w-full p-2 border rounded">

        <input type="text" name="title" placeholder="Item Title"
               class="w-full p-2 border rounded">

        <input type="text" name="description" placeholder="Description"
               class="w-full p-2 border rounded">

        <input type="number" step="0.01" name="base_price" placeholder="Base Price"
               class="w-full p-2 border rounded">

        <input type="text" name="end_time" 
               placeholder="End Time (YYYY-MM-DD HH:MM:SS)"
               class="w-full p-2 border rounded">

        <button class="w-full bg-green-500 hover:bg-green-600 text-white p-2 rounded font-semibold">
            Create Auction
        </button>

    </form>

    <div class="mt-4 text-center">
        <a href="/" class="text-blue-500 hover:underline">⬅ Back to Home</a>
    </div>

</div>

</body>
</html>
